kind = "web"
previewPath = "/"
title = "PawGlobal Pet Store"
version = "1.0.0"
id = "artifacts/pawglobal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19027

[services.development]
run = "pnpm --filter @workspace/pawglobal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pawglobal", "run", "build" ]
publicDir = "artifacts/pawglobal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19027"
BASE_PATH = "/"
